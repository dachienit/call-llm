<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 800px;
      height: 90vh;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #009de0, #0070b8);
      color: #fff;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header .avatar {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .chat-header h1 { font-size: 18px; font-weight: 600; }
    .chat-header p  { font-size: 12px; opacity: 0.85; margin-top: 2px; }

    .chat-header .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .llm-selector {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      padding: 8px 12px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      outline: none;
      transition: background 0.2s;
    }

    .llm-selector:hover {
      background: rgba(255,255,255,0.3);
    }

    .llm-selector option {
      background: #0070b8;
      color: #fff;
    }

    .llm-badge {
      font-size: 10px;
      background: rgba(255,255,255,0.25);
      padding: 3px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-dot {
      width: 8px; height: 8px;
      background: #4cff91;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 3px; }

    .message {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 75%;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user  { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot   { align-self: flex-start; }

    .message .icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.user .icon { background: #009de0; color: #fff; }
    .message.bot  .icon { background: #e8f4fc; color: #009de0; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #009de0;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: #f0f7fc;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
      border: 1px solid #dce9f3;
    }

    .typing-indicator .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .typing-indicator .dot {
      width: 8px; height: 8px;
      background: #009de0;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    .chat-footer {
      padding: 16px 20px;
      border-top: 1px solid #eef2f6;
      background: #fff;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid #d0dce8;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      max-height: 140px;
      min-height: 48px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #009de0; }

    button#send-btn {
      width: 48px; height: 48px;
      background: #009de0;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center;
    }

    button#send-btn:hover   { background: #0083c0; }
    button#send-btn:active  { transform: scale(0.95); }
    button#send-btn:disabled { background: #b0ccd8; cursor: not-allowed; }

    .error-toast {
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6cb;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">🤖</div>
      <div>
        <h1>AI Assistant</h1>
        <p><span class="status-dot"></span><span id="model-info">Powered by LLM Farm</span></p>
      </div>
      <div class="header-right">
        <select id="llm-selector" class="llm-selector">
          <option value="llm-farm">LLM Farm</option>
          <option value="dia-brain">DIA Brain</option>
        </select>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="message bot">
        <div class="icon">🤖</div>
        <div class="bubble">Xin chào! Tôi là AI Assistant. Tôi có thể giúp gì cho bạn?</div>
      </div>
    </div>

    <div class="chat-footer">
      <textarea
        id="input"
        placeholder="Nhập tin nhắn... (Shift+Enter để xuống dòng)"
        rows="1"
      ></textarea>
      <button id="send-btn" title="Send">&#9658;</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('send-btn');
    const llmSelector = document.getElementById('llm-selector');
    const modelInfo   = document.getElementById('model-info');

    // Conversation history sent to LLM
    const history = [
      { role: 'system', content: 'You are a helpful assistant. Answer clearly and concisely.' }
    ];

    // DIA Brain chat history ID for conversation continuity
    let diaChatHistoryId = null;

    // Update model info when selector changes
    llmSelector.addEventListener('change', () => {
      const selected = llmSelector.value;
      if (selected === 'llm-farm') {
        modelInfo.textContent = 'Powered by LLM Farm';
      } else {
        modelInfo.textContent = 'Powered by DIA Brain';
      }
      // Reset DIA history when switching
      diaChatHistoryId = null;
    });

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendMessage(role, text) {
      const wrapper = document.createElement('div');
      wrapper.className = `message ${role === 'user' ? 'user' : 'bot'}`;

      const icon = document.createElement('div');
      icon.className = 'icon';
      icon.textContent = role === 'user' ? '👤' : '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      wrapper.appendChild(icon);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
      return bubble;
    }

    function showTyping() {
      const wrapper = document.createElement('div');
      wrapper.className = 'message bot typing-indicator';
      wrapper.id = 'typing';

      const icon = document.createElement('div');
      icon.className = 'icon';
      icon.textContent = '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      for (let i = 0; i < 3; i++) {
        const dot = document.createElement('span');
        dot.className = 'dot';
        bubble.appendChild(dot);
      }

      wrapper.appendChild(icon);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
    }

    function removeTyping() {
      document.getElementById('typing')?.remove();
    }

    function showError(msg) {
      const el = document.createElement('div');
      el.className = 'error-toast';
      el.textContent = `⚠️ ${msg}`;
      messagesEl.appendChild(el);
      scrollToBottom();
      setTimeout(() => el.remove(), 5000);
    }

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    });

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      appendMessage('user', text);
      history.push({ role: 'user', content: text });

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
      llmSelector.disabled = true;
      showTyping();

      try {
        const selectedLLM = llmSelector.value;
        const endpoint = selectedLLM === 'dia-brain' ? '/api/chat-DIA' : '/api/chat';
        
        const requestBody = { messages: history };
        if (selectedLLM === 'dia-brain' && diaChatHistoryId) {
          requestBody.chatHistoryId = diaChatHistoryId;
        }

        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(requestBody)
        });

        const data = await res.json();
        removeTyping();

        if (!res.ok) {
          showError(data.error || 'Server error');
          history.pop();
          return;
        }

        // Save DIA Brain chat history ID for conversation continuity
        if (selectedLLM === 'dia-brain' && data.chatHistoryId) {
          diaChatHistoryId = data.chatHistoryId;
        }

        const reply = data.choices?.[0]?.message?.content ?? '(no response)';
        history.push({ role: 'assistant', content: reply });
        appendMessage('bot', reply);
      } catch (err) {
        removeTyping();
        showError('Cannot connect to server.');
        history.pop();
      } finally {
        sendBtn.disabled = false;
        llmSelector.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
