<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 860px;
      height: 95vh;
      background: #1a1b26;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      color: #fff;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header .avatar {
      width: 42px;
      height: 42px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .chat-header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
    .chat-header p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    .chat-header .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .llm-selector {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 8px 12px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: background 0.2s;
    }

    .llm-selector:hover {
      background: rgba(255,255,255,0.2);
    }

    .llm-selector option {
      background: #1e40af;
      color: #fff;
    }

    .status-dot {
      width: 8px; height: 8px;
      background: #34d399;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Timer Badge ── */
    .timer-badge {
      display: none;
      align-items: center;
      gap: 6px;
      background: rgba(251, 191, 36, 0.15);
      border: 1px solid rgba(251, 191, 36, 0.3);
      color: #fbbf24;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
      animation: fadeIn 0.3s ease;
    }

    .timer-badge.active {
      display: flex;
    }

    .timer-badge .timer-icon {
      font-size: 14px;
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    .message {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      max-width: 80%;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user  { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot   { align-self: flex-start; }

    .message .icon {
      width: 34px; height: 34px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.user .icon { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff; }
    .message.bot  .icon { background: rgba(99, 102, 241, 0.15); color: #818cf8; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: #262838;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    /* ── Stream response meta ── */
    .response-meta {
      font-size: 11px;
      color: rgba(148, 163, 184, 0.6);
      margin-top: 4px;
      padding-left: 44px;
      font-weight: 500;
      animation: fadeIn 0.3s ease;
    }

    /* ── Typing indicator ── */
    .typing-indicator .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .typing-indicator .dot {
      width: 8px; height: 8px;
      background: #818cf8;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* ── Streaming cursor blink ── */
    .streaming-cursor::after {
      content: '▋';
      animation: blink 0.8s step-end infinite;
      color: #818cf8;
      margin-left: 1px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    .chat-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: #1a1b26;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      max-height: 140px;
      min-height: 48px;
      line-height: 1.5;
      transition: border-color 0.2s;
      background: #262838;
      color: #e2e8f0;
    }

    textarea::placeholder { color: rgba(148, 163, 184, 0.5); }
    textarea:focus { border-color: #6366f1; }

    button#send-btn {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center;
    }

    button#send-btn:hover   { opacity: 0.9; }
    button#send-btn:active  { transform: scale(0.95); }
    button#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .error-toast {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">🤖</div>
      <div>
        <h1>AI Assistant</h1>
        <p><span class="status-dot"></span><span id="model-info">Powered by LLM Farm</span></p>
      </div>
      <div class="header-right">
        <div class="timer-badge" id="timer-badge">
          <span class="timer-icon">⏳</span>
          <span id="timer-value">0.0s</span>
        </div>
        <select id="llm-selector" class="llm-selector">
          <option value="llm-farm">LLM Farm</option>
          <option value="dia-brain">DIA Brain</option>
        </select>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="message bot">
        <div class="icon">🤖</div>
        <div class="bubble">Xin chào! Tôi là AI Assistant. Tôi có thể giúp gì cho bạn?</div>
      </div>
    </div>

    <div class="chat-footer">
      <textarea
        id="input"
        placeholder="Nhập tin nhắn... (Shift+Enter để xuống dòng)"
        rows="1"
      ></textarea>
      <button id="send-btn" title="Send">&#9658;</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('send-btn');
    const llmSelector = document.getElementById('llm-selector');
    const modelInfo   = document.getElementById('model-info');
    const timerBadge  = document.getElementById('timer-badge');
    const timerValue  = document.getElementById('timer-value');

    // Conversation history sent to LLM
    const history = [
      { role: 'system', content: 'You are a helpful assistant. Answer clearly and concisely.' }
    ];

    // DIA Brain chat history ID for conversation continuity
    let diaChatHistoryId = null;

    // Timer state
    let timerInterval = null;
    let timerStartTime = null;

    function startTimer() {
      timerStartTime = Date.now();
      timerBadge.classList.add('active');
      timerValue.textContent = '0.0s';
      timerInterval = setInterval(() => {
        const elapsed = ((Date.now() - timerStartTime) / 1000).toFixed(1);
        timerValue.textContent = `${elapsed}s`;
      }, 100);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      // Show final time for 3 seconds, then hide
      const finalTime = timerValue.textContent;
      timerValue.textContent = `✓ ${finalTime}`;
      setTimeout(() => {
        timerBadge.classList.remove('active');
      }, 3000);
      return finalTime;
    }

    // Update model info when selector changes
    llmSelector.addEventListener('change', () => {
      const selected = llmSelector.value;
      if (selected === 'llm-farm') {
        modelInfo.textContent = 'Powered by LLM Farm';
      } else {
        modelInfo.textContent = 'Powered by DIA Brain';
      }
      // Reset DIA history when switching
      diaChatHistoryId = null;
    });

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendMessage(role, text) {
      const wrapper = document.createElement('div');
      wrapper.className = `message ${role === 'user' ? 'user' : 'bot'}`;

      const icon = document.createElement('div');
      icon.className = 'icon';
      icon.textContent = role === 'user' ? '👤' : '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      wrapper.appendChild(icon);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
      return bubble;
    }

    /**
     * Create a bot message bubble ready for streaming content
     */
    function createStreamBubble() {
      const wrapper = document.createElement('div');
      wrapper.className = 'message bot';

      const icon = document.createElement('div');
      icon.className = 'icon';
      icon.textContent = '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble streaming-cursor';
      bubble.textContent = '';

      wrapper.appendChild(icon);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
      return { wrapper, bubble };
    }

    function showTyping() {
      const wrapper = document.createElement('div');
      wrapper.className = 'message bot typing-indicator';
      wrapper.id = 'typing';

      const icon = document.createElement('div');
      icon.className = 'icon';
      icon.textContent = '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      for (let i = 0; i < 3; i++) {
        const dot = document.createElement('span');
        dot.className = 'dot';
        bubble.appendChild(dot);
      }

      wrapper.appendChild(icon);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
    }

    function removeTyping() {
      document.getElementById('typing')?.remove();
    }

    function showError(msg) {
      const el = document.createElement('div');
      el.className = 'error-toast';
      el.textContent = `⚠️ ${msg}`;
      messagesEl.appendChild(el);
      scrollToBottom();
      setTimeout(() => el.remove(), 5000);
    }

    function addResponseMeta(elapsedTime, provider) {
      const meta = document.createElement('div');
      meta.className = 'response-meta';
      meta.textContent = `${provider} · ${elapsedTime}`;
      messagesEl.appendChild(meta);
      scrollToBottom();
    }

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    });

    /**
     * Unified streaming send for both LLM Farm and DIA Brain
     */
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      const selectedLLM = llmSelector.value;
      const isDIA = selectedLLM === 'dia-brain';
      const providerName = isDIA ? 'DIA Brain' : 'LLM Farm';

      appendMessage('user', text);
      history.push({ role: 'user', content: text });

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
      llmSelector.disabled = true;

      // Start timer
      startTimer();
      showTyping();

      try {
        // Choose endpoint
        const endpoint = isDIA ? '/api/chat-DIA-stream' : '/api/chat-stream';
        const requestBody = { messages: history };
        if (isDIA && diaChatHistoryId) {
          requestBody.chatHistoryId = diaChatHistoryId;
        }

        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(requestBody)
        });

        removeTyping();

        if (!res.ok) {
          const data = await res.json();
          stopTimer();
          showError(data.error || 'Server error');
          history.pop();
          return;
        }

        // Create streaming bubble
        const { bubble } = createStreamBubble();
        let fullContent = '';

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop() ?? '';

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed) continue;

            if (trimmed === 'data: [DONE]') {
              continue;
            }

            if (trimmed.startsWith('data: ')) {
              const jsonStr = trimmed.slice(6);
              try {
                const chunk = JSON.parse(jsonStr);

                if (chunk.error) {
                  stopTimer();
                  showError(chunk.error);
                  bubble.classList.remove('streaming-cursor');
                  if (!fullContent) bubble.parentElement?.remove();
                  history.pop();
                  return;
                }

                // Handle DIA Brain chatHistoryId
                if (chunk.chatHistoryId) {
                  diaChatHistoryId = chunk.chatHistoryId;
                }

                if (chunk.content) {
                  fullContent += chunk.content;
                  bubble.textContent = fullContent;
                  scrollToBottom();
                }
              } catch {
                // Skip malformed JSON
              }
            }
          }
        }

        // Stop streaming cursor
        bubble.classList.remove('streaming-cursor');

        // Stop timer and show response time with provider name
        const elapsed = stopTimer();
        addResponseMeta(elapsed, providerName);

        // Save to history
        history.push({ role: 'assistant', content: fullContent || '(no response)' });

        if (!fullContent) {
          bubble.textContent = '(no response)';
        }
      } catch (err) {
        removeTyping();
        stopTimer();
        showError('Cannot connect to server.');
        history.pop();
      } finally {
        sendBtn.disabled = false;
        llmSelector.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
